server:
  port: 8080

# Domyślnie PostgreSQL. Bez uruchomionej bazy backend nie wystartuje.
# Aby uruchomić BEZ PostgreSQL: ustaw profil "h2" (np. -Dspring.profiles.active=h2 lub zmienna SPRING_PROFILES_ACTIVE=h2).
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smarthome
    username: smarthome
    password: smarthome
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

# 1 real second = speedFactor sim seconds (2000 -> ~33 min sim per 1 real sec). Szybsze testy, cele osiągalne w 1-3 min.
# stepSimMs: fixed sim-time grid for Study 1A analytics (1000–5000 ms). Ensures deterministic, sampling-independent results.
# maxRunRealSecondsPerPolicy: hard cap per policy run (Manual/Schedule); comparison = 2× this.
sim:
  speedFactor: 2000
  stepSimMs: 1000
  maxRunRealSecondsPerPolicy: 300
  uiPresets: "90,120,180,300"

# JWT secret (min 256 bits for HS256). Change in production.
auth:
  jwt:
    secret: magisterka-demo-secret-key-at-least-32-bytes-long-for-hs256
    expirationMs: 86400000  # 24h

# Batch simulation: nominal power in W per deviceId. Missing deviceId → 400 "Missing devicePowerW for X".
batch:
  devicePowerW:
    heater-01: 1750
    heater-02: 2000
    bulb-01: 8
    bulb-02: 12
    bulb-03: 10
    plug-01: 1250
    washer-01: 500
    fridge-01: 125
  manualOnProbability: 0.9

mqtt:
  broker: tcp://localhost:1883
  clientIdPrefix: MagisterkaBackend-
  telemetryTopic: smarthome/v1/devices/+/+/telemetry
  stateTopic: smarthome/v1/devices/+/+/state
  cmdTopicPattern: smarthome/v1/devices/%s/%s/cmd
  # Optional: set when broker requires authentication
  # username: backend
  # password: secret

